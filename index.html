<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PokeMax</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <h1>PokeMax</h1>
        <p>La mejor forma de buscar pokémon</p>
    </header>

    <div class="busqueda">
        <h1>Busca tu pokemón</h1>
        <p>Por nombre o ID</p>
        <form onsubmit="mostrarPokemon(); return false;">
            <input type="text" id="inputPokemon" placeholder="Ej: Pikachu, 25">
            <button type="submit" id="botonBusqueda">Buscar</button>
        </form>
    </div>

    <div id="resultado"></div>
    <script src="script.js"></script>
</body>
</html>
